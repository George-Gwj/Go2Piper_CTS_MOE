    per_task_advantage_normalization: true
    use_popart: true
    popart_beta: 0.99
    popart_eps: 1.0e-05
    popart_min_std: 0.01
    popart_use_output_rescale: true
    popart_value_loss: huber
    popart_huber_delta: 1.0
    value_loss_per_task_average: true
