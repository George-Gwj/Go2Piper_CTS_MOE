    - 256
    - 128
    router_hidden_dims:
    - 128
    - 64
    expert_names:
    - lateral_avoidance
    - under_table
    - stair_up
    - flat
    critic_hidden_dims:
    - 256
    - 128
    critic_shared_trunk: false
    critic_trunk_hidden_dims: null
    critic_head_hidden_dims:
